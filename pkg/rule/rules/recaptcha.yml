rules:
  - name: reCAPTCHA API Key
    id: kingfisher.recaptcha.1
    pattern: |
      (?xi)
      recaptcha
      (?:.|[\n\r]){0,40}?
      \b
      (?P<token>
        6l[c-f][a-z0-9_-].{36}
      )
    pattern_requirements:
      min_digits: 3
    min_entropy: 3
    confidence: medium
    examples:
      - recaptcha apikey = 6Lcr--w-BBBBBw-w-w----w-w-www-www--ww-w-
      - recaptcha_secret = 6Lcw--w-AAAAAw-w-w----w-w-www-www--ww-w-
      - '"recaptcha": { "site_key": "6Lcs--w-AAAAAw-w-w----w-w-www-www--ww-w-" }'
    # Standalone YAML validator cannot handle this case: requires body
    # interpolation (secret={{ TOKEN }}) and word matching, which are not
    # supported by the standalone validator framework (pkg/validator/yaml.go).
    validation:
      type: Http
      content:
        request:
          method: POST
          url: https://www.google.com/recaptcha/api/siteverify
          headers:
            Content-Type: application/x-www-form-urlencoded
          body: |
            secret={{ TOKEN }}&response=test
          response_matcher:
            - report_response: true
            - type: StatusMatch
              status: [200]
            - type: WordMatch
              words: ['invalid-input-secret']
              negative: true

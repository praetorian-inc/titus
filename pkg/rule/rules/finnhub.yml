rules:
  - name: Finnhub API Token
    id: kingfisher.finnhub.1
    pattern: |
      (?xi)
      \b
      finnhub
      (?:.|[\n\r]){0,24}?
      \b
      (?P<token>
        [a-z0-9]{20}
      )
      \b
    pattern_requirements:
      min_digits: 2
    min_entropy: 3.0
    confidence: medium
    examples:
      - FINNHUB_API_KEY=cd3f1a2b3c4d5e6f7a8b
      - '"finnhubToken": "9b8a7c6d5e4f3a2b1c0d"'
    references:
      - https://finnhub.io/docs/api

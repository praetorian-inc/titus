# Default ignore patterns for titus (seeded from noseyparker).
# Uses gitignore syntax. Applied to blob paths during enumeration.
# These reduce scan noise — not a security boundary.

# Git packfiles and internal objects
**/objects/pack/pack-*.pack
**/objects/pack/pack-*.idx
**/packed-refs

# Vendored Node.js dependencies (node_modules)
# AWS SDKs - generated code, examples, type definitions
**/node_modules/@aws-sdk/**
**/node_modules/aws-sdk/dist/**
**/node_modules/aws-sdk/apis/**
**/node_modules/aws-sdk/clients/**

# Test directories within node_modules (contain example credentials)
**/node_modules/**/test/**
**/node_modules/**/tests/**
**/node_modules/**/__tests__/**

# Documentation within node_modules (example credentials in code snippets)
**/node_modules/**/README.md
**/node_modules/**/README.markdown

# Vendored Python dependencies
# Site-packages AWS SDKs
**/site-packages/botocore/**
**/site-packages/boto3/**
**/site-packages/awscli/**
**/site-packages/moto/**
**/site-packages/ecdsa/**
**/site-packages/tornado/test/**
**/site-packages/flask/testsuite/**

# PyCryptodome / PyCrypto test vectors (RSA/DSA/ECC private keys for unit tests)
# These are well-known test fixtures, not real secrets
**/Crypto/SelfTest/**
**/Cryptodome/SelfTest/**

# Python bytecode (can't contain secrets, just noise)
**/__pycache__/**

# Lockfiles
Cargo.lock
package-lock.json
Pipfile.lock
go.sum
yarn.lock
pnpm-lock.yaml
composer.lock
Gemfile.lock
poetry.lock

# Minified / generated assets
**/*.min.js
**/*.min.css

# Binaries and libraries
libgnutls.a
libgnutls.so.*

# OpenSSL test data
**/openssl*/test/recipes/**/evppkey*.txt

# Linux virtual filesystems
/dev/**
/proc/**
/sys/**

# AWS SDK examples
**/botocore/data/**/examples-1.json

# 1Password Service Account Token validation
# NOTE: Only kingfisher.1password.1 (Service Account Token) is validatable.
# kingfisher.1password.2 (Account Secret Key) has no HTTP validation endpoint.
validators:
  - name: 1password-service-account-token
    rule_ids:
      - kingfisher.1password.1
    http:
      method: GET
      url: "https://events.1password.com/api/v2/auth/introspect"
      auth:
        type: bearer
        secret_group: "token"
      headers:
        - name: Accept
          value: application/json
      success_codes: [200]
      failure_codes: [401, 403]

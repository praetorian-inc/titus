validators:
  - name: typeform-api-token
    rule_ids:
      - kingfisher.typeform.1
    http:
      method: GET
      url: https://api.typeform.com/forms
      auth:
        type: bearer
        secret_group: "1"
      headers:
        - name: Accept
          value: application/json
      success_codes: [200]
      failure_codes: [401, 403]

validators:
  - name: messagebird-api-token
    rule_ids:
      - kingfisher.messagebird.1
    http:
      method: GET
      url: https://rest.messagebird.com/balance
      auth:
        type: api_key
        secret_group: "1"
        key_prefix: "AccessKey "
      headers:
        - name: Accept
          value: application/json
      success_codes: [200]
      failure_codes: [401, 403]

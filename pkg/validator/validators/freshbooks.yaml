validators:
  - name: freshbooks-access-token
    rule_ids:
      - kingfisher.freshbooks.1
    http:
      method: GET
      url: "https://api.freshbooks.com/auth/api/v1/users/me"
      auth:
        type: bearer
        secret_group: "token"
      success_codes: [200]
      failure_codes: [401, 403]

validators:
  - name: pastebin-api-key
    rule_ids:
      - kingfisher.pastebin.1
    http:
      method: POST
      url: "https://pastebin.com/api/api_login.php"
      auth:
        type: none
        secret_group: "token"
      headers:
        - name: Content-Type
          value: application/x-www-form-urlencoded
      body: "api_dev_key={{token}}&api_user_name=dummy&api_user_password=dummy"
      success_codes: [200]
      failure_codes: [401, 403, 422]

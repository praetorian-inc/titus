validators:
  - name: sonarcloud-token
    rule_ids:
      - kingfisher.sonarcloud.1
    http:
      method: GET
      url: https://sonarcloud.io/api/user_tokens/search
      auth:
        type: bearer
        secret_group: "1"
      headers:
        - name: Accept
          value: application/json
      success_codes: [200]
      failure_codes: [401, 403]
